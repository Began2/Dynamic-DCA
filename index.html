<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dynamic DCA</title>

  <!-- TradingView Lightweight Charts: free, pro trading chart engine -->
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <!-- Chart.js: still used for the small histogram bar chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --bg:        #0b0b0c;
      --panel:     #141415;
      --panel-2:   #1c1c1e;
      --border:    #262628;
      --text:      #ededed;
      --text-dim:  #8a8a8d;
      --text-mute: #525255;
      --green:     #2ecc71;
      --green-dim: #1e8449;
      --red:       #e74c3c;
      --red-dim:   #922b21;
      --yellow:    #f1c40f;
      --accent:    #9a9a9d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: radial-gradient(1200px 600px at 50% -10%, #1a1a1c 0%, var(--bg) 55%);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 26px 24px 60px;
    }
    .wrap { max-width: 1500px; margin: 0 auto; }
    /* the chart block breaks out wider than the rest of the page */
    .wide { max-width: 1760px; margin-left: auto; margin-right: auto; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px; margin-bottom: 24px;
      padding-bottom: 16px; border-bottom: 1px solid var(--border);
    }
    .brand { display: flex; align-items: center; gap: 11px; }
    .brand h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.4px; }
    #status { font-size: 0.76rem; color: var(--text-dim); }

    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 18px; }
    .panel h2 { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); margin-bottom: 14px; }

    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 18px; }
    .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
    .stat .k { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.09em; color: var(--text-mute); margin-bottom: 7px; }
    .stat .v { font-size: 1.35rem; font-weight: 700; }
    .stat .d { font-size: 0.72rem; margin-top: 4px; color: var(--text-dim); }
    .up { color: var(--green); } .down { color: var(--red); }

    /* ── Chart toolbar ── */
    .chart-head { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
    .chart-title { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); }
    .toolbar { display: flex; gap: 6px; flex-wrap: wrap; }
    .tool {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--panel-2); border: 1px solid var(--border); color: var(--text-dim);
      border-radius: 8px; padding: 7px 11px; font-size: 0.76rem; font-family: inherit;
      cursor: pointer; transition: all 0.15s;
    }
    .tool:hover { color: var(--text); border-color: #3a3a3d; }
    .tool.active { background: var(--text); color: #000; border-color: var(--text); }
    .tool svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .tool-sep { width: 1px; background: var(--border); margin: 2px 4px; }

    /* range selector buttons */
    .ranges { display: flex; gap: 4px; flex-wrap: wrap; }
    .range-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); border-radius: 7px; padding: 5px 10px; font-size: 0.72rem; font-family: inherit; cursor: pointer; transition: all 0.12s; }
    .range-btn:hover { color: var(--text); }
    .range-btn.active { background: var(--panel-2); color: var(--text); border-color: var(--accent); }

    /* ── Chart container + drawing overlay ── */
    .chart-stage { position: relative; }
    #tvchart { width: 100%; height: 600px; }
    #drawLayer { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
    #drawLayer.armed { pointer-events: auto; cursor: crosshair; }

    /* floating crosshair tooltip (always on) */
    #tipbox {
      position: absolute; z-index: 8; pointer-events: none; display: none;
      background: rgba(20,20,21,0.95); border: 1px solid var(--border); border-radius: 9px;
      padding: 9px 11px; font-size: 0.74rem; line-height: 1.5; min-width: 150px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    }
    #tipbox .td { color: var(--text-dim); }
    #tipbox .tv { color: var(--text); font-weight: 600; float: right; margin-left: 18px; }
    #tipbox .trow { clear: both; }

    /* ── Risk meter (below chart) ── */
    .meter-panel { margin-top: 18px; }
    .meter-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px; margin-bottom: 14px; }
    .meter-score { display: flex; align-items: baseline; gap: 12px; }
    .meter-score .num { font-size: 2.6rem; font-weight: 800; line-height: 1; }
    .meter-score .lab { font-size: 0.9rem; font-weight: 600; }
    .meter-action { font-size: 0.85rem; color: var(--text-dim); }
    .bar { position: relative; height: 16px; border-radius: 8px;
      background: linear-gradient(to right, var(--green) 0%, #7fdca4 20%, var(--yellow) 45%, #e8a87c 62%, var(--red) 80%, var(--red-dim) 100%); }
    .bar .needle { position: absolute; top: -5px; width: 4px; height: 26px; background: var(--text); border-radius: 3px; transform: translateX(-50%); transition: left 0.7s cubic-bezier(.2,.8,.2,1); box-shadow: 0 0 8px rgba(0,0,0,0.6); }
    .bar-scale { display: flex; justify-content: space-between; font-size: 0.66rem; color: var(--text-mute); margin-top: 6px; }

    .lower-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin: 18px 0; }
    @media (max-width: 880px) { .lower-grid { grid-template-columns: 1fr; } }

    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th { text-align: left; padding: 9px 10px; color: var(--text-mute); text-transform: uppercase; font-size: 0.62rem; letter-spacing: 0.08em; border-bottom: 1px solid var(--border); }
    td { padding: 11px 10px; border-bottom: 1px solid #141a23; }
    tr:last-child td { border-bottom: none; }
    tr.active td { background: var(--panel-2); }
    .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 9px; vertical-align: middle; }

    .bt-controls { display: flex; flex-wrap: wrap; gap: 18px; align-items: flex-end; margin-bottom: 18px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 0.64rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); }
    .field input, .field select { background: var(--panel-2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 9px 12px; font-family: inherit; font-size: 0.9rem; width: 160px; }
    .field input:focus, .field select:focus { outline: none; border-color: var(--accent); }
    .field select { cursor: pointer; }
    /* white calendar icon + dark popup for the date picker */
    .field input[type="date"] { color-scheme: dark; }
    .field input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.7; cursor: pointer; }
    .field input[type="date"]::-webkit-calendar-picker-indicator:hover { opacity: 1; }
    /* number stepper styled to match the site */
    .num-field { position: relative; display: inline-flex; align-items: center; }
    .num-field input { -moz-appearance: textfield; appearance: textfield; padding-right: 38px; width: 160px; }
    .num-field input::-webkit-inner-spin-button,
    .num-field input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .num-stepper { position: absolute; right: 6px; display: flex; flex-direction: column; gap: 2px; }
    .num-stepper button {
      width: 22px; height: 14px; padding: 0; line-height: 1;
      background: var(--bg); border: 1px solid var(--border); color: var(--text-dim);
      border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.12s;
    }
    .num-stepper button:hover { color: var(--text); border-color: var(--accent); background: var(--panel-2); }
    .num-stepper svg { width: 9px; height: 9px; stroke: currentColor; fill: none; stroke-width: 2.5; }

    .bt-results { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .bt-card { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
    .bt-card .t { font-size: 0.64rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 8px; }
    .bt-card .big { font-size: 1.5rem; font-weight: 700; }
    .bt-card .row { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--text-dim); margin-top: 6px; }
    .bt-card .row b { color: var(--text); font-weight: 600; }
    .winner { border-color: var(--green-dim); box-shadow: 0 0 0 1px var(--green-dim); }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <h1>Dynamic DCA</h1>
    </div>
    <div id="status">Loading…</div>
  </header>

  <div class="stats-row" id="stats-row"></div>
</div>

<!-- ── Main chart (breaks out wider, no card) ── -->
<div class="wide">
  <div class="chart-head">
    <div class="chart-title" id="chart-title">Price &amp; Risk · Log Regression</div>
    <div class="toolbar" id="toolbar">
      <!-- series type -->
      <button class="tool active" data-series="candles" title="Candlesticks">
        <svg viewBox="0 0 24 24"><rect x="6" y="7" width="4" height="9"/><line x1="8" y1="4" x2="8" y2="7"/><line x1="8" y1="16" x2="8" y2="20"/><rect x="14" y="9" width="4" height="7"/><line x1="16" y1="5" x2="16" y2="9"/><line x1="16" y1="16" x2="16" y2="19"/></svg>
        Candles
      </button>
      <button class="tool" data-series="line" title="Line">
        <svg viewBox="0 0 24 24"><polyline points="3 17 9 11 13 15 21 6"/></svg>
        Line
      </button>
      <div class="tool-sep"></div>
      <!-- view mode: normal vs buy-zones -->
      <button class="tool" data-mode="zones" title="Buy-zone heat map">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="4"/><rect x="3" y="10" width="18" height="4"/><rect x="3" y="16" width="18" height="4"/></svg>
        Buy Zones
      </button>
      <button class="tool" data-mode="riskline" title="Show the 0–1 risk score as a line along the bottom">
        <svg viewBox="0 0 24 24"><path d="M3 18c3 0 4-9 7-9s4 6 7 6 2-7 4-7"/></svg>
        Risk Line
      </button>
      <div class="tool-sep"></div>
      <!-- drawing tools (hold & drag to draw) -->
      <button class="tool" data-draw="trend" title="Trend line — hold and drag">
        <svg viewBox="0 0 24 24"><line x1="4" y1="19" x2="20" y2="6"/><circle cx="4" cy="19" r="1.6"/><circle cx="20" cy="6" r="1.6"/></svg>
        Trend
      </button>
      <button class="tool" data-draw="hline" title="Horizontal line — hold and drag">
        <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/></svg>
        H-Line
      </button>
      <button class="tool" data-draw="measure" title="Measure % change — hold and drag">
        <svg viewBox="0 0 24 24"><path d="M3 16l5-5 4 4 8-8"/><path d="M14 7h6v6"/></svg>
        Measure %
      </button>
      <button class="tool" data-draw="fib" title="Fibonacci retracement — hold and drag">
        <svg viewBox="0 0 24 24"><line x1="3" y1="5" x2="21" y2="5"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="3" y1="20" x2="21" y2="20"/></svg>
        Fib
      </button>
      <button class="tool" data-action="clear" title="Clear drawings">
        <svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 14h10l1-14"/></svg>
        Clear
      </button>
      <div class="tool-sep"></div>
      <!-- reset view -->
      <button class="tool" data-action="fit" title="Reset view / fit all">
        <svg viewBox="0 0 24 24"><path d="M3 9V3h6"/><path d="M21 9V3h-6"/><path d="M3 15v6h6"/><path d="M21 15v6h-6"/></svg>
        Reset View
      </button>
    </div>
  </div>

  <!-- range presets -->
  <div class="chart-head" style="margin-bottom:10px">
    <div class="ranges" id="ranges">
      <button class="range-btn" data-range="365">1Y</button>
      <button class="range-btn" data-range="1095">3Y</button>
      <button class="range-btn active" data-range="1825">5Y</button>
      <button class="range-btn" data-range="all">All</button>
    </div>
  </div>

  <div class="chart-stage">
    <div id="tvchart"></div>
    <canvas id="drawLayer"></canvas>
    <div id="tipbox"></div>
  </div>
</div>

<div class="wrap">
  <!-- ── Risk meter (full site width) ── -->
  <div class="meter-panel">
    <div class="meter-top">
      <div class="meter-score">
        <span class="num" id="m-num">···</span>
        <span class="lab" id="m-lab"></span>
      </div>
      <div class="meter-action" id="m-action"></div>
    </div>
    <div class="bar"><div class="needle" id="m-needle"></div></div>
    <div class="bar-scale"><span>0.0 · Buy</span><span>0.25</span><span>0.5</span><span>0.75</span><span>1.0 · Sell</span></div>
  </div>

  <!-- ── Lower: histogram + band table ── -->
  <div class="lower-grid">
    <div class="panel">
      <h2>Time Spent in Each Risk Band</h2>
      <canvas id="histChart" height="220"></canvas>
    </div>
    <div class="panel">
      <h2>DCA Strategy Bands</h2>
      <table>
        <thead><tr><th>Band</th><th>Range</th><th>Action</th><th>Mult</th></tr></thead>
        <tbody id="band-body"></tbody>
      </table>
    </div>
  </div>

  <!-- ── Backtest ── -->
  <div class="panel">
    <h2>Backtest · Dynamic DCA vs. Flat DCA</h2>
    <div class="bt-controls">
      <div class="field"><label>Contribution ($)</label>
        <div class="num-field">
          <input id="bt-amount" type="number" value="100" min="1" step="10" />
          <div class="num-stepper">
            <button type="button" data-step="up" aria-label="Increase"><svg viewBox="0 0 24 24"><polyline points="6 15 12 9 18 15"/></svg></button>
            <button type="button" data-step="down" aria-label="Decrease"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></button>
          </div>
        </div>
      </div>
      <div class="field"><label>Frequency</label>
        <select id="bt-freq">
          <option value="1">Daily</option>
          <option value="7" selected>Weekly</option>
          <option value="30">Monthly</option>
          <option value="0">Lump sum (once)</option>
        </select>
      </div>
      <div class="field"><label>Start</label><input id="bt-start" type="date" /></div>
      <div class="field"><label>End</label><input id="bt-end" type="date" /></div>
    </div>
    <div class="bt-results" id="bt-results"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   1. CONFIG
   ═══════════════════════════════════════════════════════════════════════════ */
const BANDS = [
  { min: 0.00, max: 0.20, hex: '#2ecc71', label: 'Very Low', action: 'Accumulate Hard', mult: 3.0 },
  { min: 0.20, max: 0.40, hex: '#7fdca4', label: 'Low',      action: 'Accumulate',      mult: 2.0 },
  { min: 0.40, max: 0.55, hex: '#f1c40f', label: 'Moderate', action: 'DCA Normal',      mult: 1.0 },
  { min: 0.55, max: 0.70, hex: '#e8a87c', label: 'Elevated', action: 'Reduce / Hold',   mult: 0.5 },
  { min: 0.70, max: 0.85, hex: '#e74c3c', label: 'High',     action: 'Take Profits',    mult: 0.0 },
  { min: 0.85, max: 1.01, hex: '#922b21', label: 'Extreme',  action: 'Sell / Exit',     mult: -1.0 },
];
const getBand = (r) => BANDS.find(b => r >= b.min && r < b.max) ?? BANDS[BANDS.length - 1];
const fmtUSD = (v, d = 0) => '$' + Number(v).toLocaleString(undefined, { maximumFractionDigits: d });
const isoDay = (sec) => new Date(sec * 1000).toISOString().slice(0, 10);

/* ═══════════════════════════════════════════════════════════════════════════
   2. DATA — baked OHLC history + live latest close
   ═══════════════════════════════════════════════════════════════════════════ */
async function loadData() {
  const hist = await (await fetch('btc-history.json')).json();  // [{t,o,h,l,c}], t in seconds
  let bars = hist.slice();
  try {
    const live = await (await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd')).json();
    const px = live?.bitcoin?.usd;
    if (px) {
      const todaySec = Math.floor(Date.now() / 1000);
      const last = bars[bars.length - 1];
      if (todaySec - last.t < 86400) {
        last.c = px; last.h = Math.max(last.h, px); last.l = Math.min(last.l, px);
      } else {
        bars.push({ t: todaySec, o: px, h: px, l: px, c: px });
      }
    }
  } catch (e) { /* baked data is enough */ }
  return bars;
}

/* ═══════════════════════════════════════════════════════════════════════════
   3. MATH — log regression on closes
   ═══════════════════════════════════════════════════════════════════════════ */
const GENESIS_SEC = Date.UTC(2009, 0, 3) / 1000;
const daysSince = (tSec) => (tSec - GENESIS_SEC) / 86400;

function fitRegression(bars) {
  let n = bars.length, sx = 0, sy = 0, sxy = 0, sx2 = 0;
  for (const b of bars) {
    const x = Math.log(daysSince(b.t)), y = Math.log(b.c);
    sx += x; sy += y; sxy += x * y; sx2 += x * x;
  }
  const slope = (n * sxy - sx * sy) / (n * sx2 - sx * sx);
  const intercept = (sy - slope * sx) / n;
  return { slope, intercept };
}
const trendAt = (tSec, m, b) => Math.exp(m * Math.log(daysSince(tSec)) + b);

function computeRisk(bars, m, b) {
  const devs = bars.map(x => Math.log(x.c / trendAt(x.t, m, b)));
  const lo = Math.min(...devs), hi = Math.max(...devs);
  return bars.map((x, i) => ({
    ...x,
    trend: trendAt(x.t, m, b),
    risk: Math.max(0, Math.min(1, (devs[i] - lo) / (hi - lo))),
  }));
}

// Given a risk level (0..1), what price corresponds to it today/at time t?
// Invert the normalization: dev = lo + risk*(hi-lo); price = trend * e^dev
let DEV_LO = 0, DEV_HI = 1, SLOPE = 0, INTER = 0;
function priceForRisk(tSec, risk) {
  const dev = DEV_LO + risk * (DEV_HI - DEV_LO);
  return trendAt(tSec, SLOPE, INTER) * Math.exp(dev);
}

/* ═══════════════════════════════════════════════════════════════════════════
   4. STATE
   ═══════════════════════════════════════════════════════════════════════════ */
let RESULTS = [];
let chart, priceChart, candleSeries, lineSeries, trendSeries, riskSeries;
let zonesOn = false;
let zoneSeries = [];   // band area series for buy-zone mode

/* ═══════════════════════════════════════════════════════════════════════════
   5. TRADINGVIEW CHART
   Price pane (right axis) + a separate synced Risk pane below it. Two panes
   means risk no longer fights the price scale — fixes the zoom drift bug.
   ═══════════════════════════════════════════════════════════════════════════ */
function buildChart() {
  const el = document.getElementById('tvchart');
  chart = LightweightCharts.createChart(el, {
    layout: { background: { color: 'transparent' }, textColor: '#8a8a8d', fontFamily: 'Segoe UI, system-ui, sans-serif' },
    grid: { vertLines: { color: '#1a1a1c' }, horzLines: { color: '#1a1a1c' } },
    rightPriceScale: { borderColor: '#262628', mode: LightweightCharts.PriceScaleMode.Logarithmic, scaleMargins: { top: 0.12, bottom: 0.12 } },
    timeScale: { borderColor: '#262628', timeVisible: false, fixLeftEdge: true, fixRightEdge: true, lockVisibleTimeRangeOnResize: true },
    crosshair: {
      mode: LightweightCharts.CrosshairMode.Normal,
      vertLine: { color: '#5a5a5d', width: 1, style: 2, labelBackgroundColor: '#1c1c1e' },
      horzLine: { color: '#5a5a5d', width: 1, style: 2, labelBackgroundColor: '#1c1c1e' },
    },
    handleScroll: true, handleScale: true,
  });

  // price + trend on the right (log) scale
  candleSeries = chart.addCandlestickSeries({
    upColor: '#2ecc71', downColor: '#e74c3c', borderVisible: false,
    wickUpColor: '#2ecc71', wickDownColor: '#e74c3c', priceScaleId: 'right',
  });
  lineSeries = chart.addLineSeries({ color: '#4d9fff', lineWidth: 2, priceScaleId: 'right', visible: false });
  trendSeries = chart.addLineSeries({ color: '#e6c84f', lineWidth: 2, lineStyle: 2, priceScaleId: 'right', crosshairMarkerVisible: false });

  // risk on its OWN scale, pinned to the bottom strip — OFF by default (Buy Zones shows risk better)
  riskSeries = chart.addLineSeries({
    color: '#9a9a9d', lineWidth: 2, priceScaleId: 'risk', visible: false,
    crosshairMarkerVisible: false, lastValueVisible: false, priceLineVisible: false,
  });
  chart.priceScale('risk').applyOptions({ scaleMargins: { top: 0.82, bottom: 0.02 }, borderColor: '#262628' });

  // keep drawing-overlay canvas sized to the chart
  const ro = new ResizeObserver(() => { sizeDrawLayer(); redrawDrawings(); });
  ro.observe(el);
  chart.timeScale().subscribeVisibleLogicalRangeChange(() => redrawDrawings());

  // always-on crosshair tooltip
  chart.subscribeCrosshairMove(onCrosshair);
}

function pushData() {
  candleSeries.setData(RESULTS.map(r => ({ time: r.t, open: r.o, high: r.h, low: r.l, close: r.c })));
  lineSeries.setData(RESULTS.map(r => ({ time: r.t, value: r.c })));
  trendSeries.setData(RESULTS.map(r => ({ time: r.t, value: r.trend })));
  riskSeries.setData(RESULTS.map(r => ({ time: r.t, value: r.risk })));
}

/* ── Buy-zone heat map: horizontal price bands colored by risk band ──
   Each band's price ceiling is priceForRisk(t, band.max), so the colored
   areas curve upward with the regression — like the reference chart. */
function buildZones() {
  // build from bottom band up, each as an area series filled to its top price
  for (const b of [...BANDS].reverse()) {
    const s = chart.addAreaSeries({
      priceScaleId: 'right', lineWidth: 0,
      topColor: hexA(b.hex, 0.22), bottomColor: hexA(b.hex, 0.06), lineColor: 'transparent',
      crosshairMarkerVisible: false, lastValueVisible: false, priceLineVisible: false, visible: false,
      // do NOT let the colored zones drive the price axis — only candles/line set the scale,
      // otherwise the top band (~$2M) squishes all the real candles to the bottom.
      autoscaleInfoProvider: () => null,
    });
    s.setData(RESULTS.map(r => ({ time: r.t, value: priceForRisk(r.t, b.max) })));
    s._band = b;
    zoneSeries.push(s);
  }
}
function hexA(hex, a) {
  const n = parseInt(hex.slice(1), 16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}
function setZones(on) {
  zonesOn = on;
  zoneSeries.forEach(s => s.applyOptions({ visible: on }));
  document.getElementById('chart-title').textContent = on
    ? 'Buy Zones · Price colored by accumulation multiplier'
    : 'Price & Risk · Log Regression';
  redrawDrawings();
}

/* ═══════════════════════════════════════════════════════════════════════════
   6. CROSSHAIR TOOLTIP (always on)
   ═══════════════════════════════════════════════════════════════════════════ */
const tip = document.getElementById('tipbox');
const byTime = new Map();
function onCrosshair(param) {
  if (!param.time || !param.point) { tip.style.display = 'none'; return; }
  const r = byTime.get(param.time);
  if (!r) { tip.style.display = 'none'; return; }
  const band = getBand(r.risk);
  tip.innerHTML =
    `<div class="trow"><span class="td">${isoDay(r.t)}</span></div>` +
    `<div class="trow"><span class="td">Open</span><span class="tv">${fmtUSD(r.o)}</span></div>` +
    `<div class="trow"><span class="td">High</span><span class="tv">${fmtUSD(r.h)}</span></div>` +
    `<div class="trow"><span class="td">Low</span><span class="tv">${fmtUSD(r.l)}</span></div>` +
    `<div class="trow"><span class="td">Close</span><span class="tv">${fmtUSD(r.c)}</span></div>` +
    `<div class="trow"><span class="td">Fair Value</span><span class="tv">${fmtUSD(r.trend)}</span></div>` +
    `<div class="trow"><span class="td">Risk</span><span class="tv" style="color:${band.hex}">${r.risk.toFixed(3)} · ${band.label}</span></div>`;
  const stage = document.getElementById('tvchart').getBoundingClientRect();
  let x = param.point.x + 18, y = param.point.y + 18;
  if (x + 190 > stage.width) x = param.point.x - 190;
  if (y + 170 > stage.height) y = param.point.y - 170;
  tip.style.left = Math.max(0, x) + 'px';
  tip.style.top = Math.max(0, y) + 'px';
  tip.style.display = 'block';
}

/* ═══════════════════════════════════════════════════════════════════════════
   7. DRAWING TOOLS — overlay canvas. Hold & drag. Stored in time/price coords
      so they stay anchored when you zoom/pan; clipped to chart bounds so they
      never spill outside the graph.
   ═══════════════════════════════════════════════════════════════════════════ */
const drawCanvas = document.getElementById('drawLayer');
const dctx = drawCanvas.getContext('2d');
let drawMode = null;           // 'trend' | 'hline' | 'measure' | 'fib' | null
let drawings = [];             // {type, points:[{time,price}], reveal}
let dragging = null;

function sizeDrawLayer() {
  const r = document.getElementById('tvchart').getBoundingClientRect();
  drawCanvas.width = r.width; drawCanvas.height = r.height;
}
function toXY(pt) {
  return { x: chart.timeScale().timeToCoordinate(pt.time), y: candleSeries.priceToCoordinate(pt.price) };
}
function eventToPoint(e) {
  const rect = drawCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  return { time: chart.timeScale().coordinateToTime(x), price: candleSeries.coordinateToPrice(y), x, y };
}

function drawSegment(d, progress = 1) {
  const a = toXY(d.points[0]), b = toXY(d.points[1] || d.points[0]);
  if (a.x == null || a.y == null) return;
  // clip everything to the chart area so drawings never spill outside
  dctx.save();
  dctx.beginPath(); dctx.rect(0, 0, drawCanvas.width, drawCanvas.height); dctx.clip();

  if (d.type === 'hline') {
    dctx.lineWidth = 1.6; dctx.strokeStyle = '#e6c84f'; dctx.setLineDash([]);
    dctx.beginPath(); dctx.moveTo(0, a.y); dctx.lineTo(drawCanvas.width * progress, a.y); dctx.stroke();
    dctx.fillStyle = '#e6c84f';
    dctx.font = '600 11px Segoe UI'; dctx.fillText(fmtUSD(d.points[0].price), 6, a.y - 5);
    dctx.restore(); return;
  }
  if (b.x == null || b.y == null) { dctx.restore(); return; }
  const ex = a.x + (b.x - a.x) * progress, ey = a.y + (b.y - a.y) * progress;

  if (d.type === 'fib') {
    drawFib(a, b, progress); dctx.restore(); return;
  }

  dctx.lineWidth = 1.6; dctx.setLineDash([]);
  dctx.strokeStyle = d.type === 'measure' ? '#6fcf97' : '#e6c84f';
  dctx.beginPath(); dctx.moveTo(a.x, a.y); dctx.lineTo(ex, ey); dctx.stroke();
  dctx.fillStyle = dctx.strokeStyle;
  for (const p of [a, { x: ex, y: ey }]) { dctx.beginPath(); dctx.arc(p.x, p.y, 3, 0, 7); dctx.fill(); }

  if (d.type === 'measure' && progress > 0.15) {
    const p0 = d.points[0].price, p1 = d.points[1].price;
    const pct = (p1 - p0) / p0 * 100;
    const txt = `${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%   ${pct >= 0 ? '+' : '−'}${fmtUSD(Math.abs(p1 - p0))}`;
    dctx.font = '600 12px Segoe UI';
    const w = dctx.measureText(txt).width;
    const lx = ex + 8, ly = ey - 10;
    dctx.fillStyle = 'rgba(20,20,21,0.92)'; dctx.fillRect(lx - 6, ly - 14, w + 12, 22);
    dctx.strokeStyle = '#262628'; dctx.lineWidth = 1; dctx.strokeRect(lx - 6, ly - 14, w + 12, 22);
    dctx.fillStyle = pct >= 0 ? '#6fcf97' : '#e57373'; dctx.fillText(txt, lx, ly + 2);
  }
  dctx.restore();
}

const FIBS = [0, 0.236, 0.382, 0.5, 0.618, 0.786, 1];
function drawFib(a, b, progress) {
  const x0 = Math.min(a.x, b.x), x1 = x0 + Math.abs(b.x - a.x) * progress;
  dctx.font = '600 10px Segoe UI';
  for (const f of FIBS) {
    const y = a.y + (b.y - a.y) * f;
    dctx.strokeStyle = 'rgba(230,200,79,0.55)'; dctx.lineWidth = 1; dctx.setLineDash([4, 4]);
    dctx.beginPath(); dctx.moveTo(x0, y); dctx.lineTo(x1, y); dctx.stroke();
    dctx.setLineDash([]);
    dctx.fillStyle = '#e6c84f'; dctx.fillText(f.toFixed(3), x1 + 4, y + 3);
  }
}

function redrawDrawings() {
  dctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  for (const d of drawings) drawSegment(d, d.reveal ?? 1);
  if (dragging && dragging.start && dragging.end)
    drawSegment({ type: dragging.type, points: [dragging.start, dragging.end] }, 1);
}

function armDraw(mode) { drawMode = mode; dragging = null; drawCanvas.classList.toggle('armed', !!mode); }

drawCanvas.addEventListener('mousedown', (e) => {
  if (!drawMode) return;
  const p = eventToPoint(e);
  if (p.time == null || p.price == null) return;
  dragging = { type: drawMode, start: { time: p.time, price: p.price }, end: { time: p.time, price: p.price } };
});
drawCanvas.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const p = eventToPoint(e);
  if (p.time == null || p.price == null) return;
  dragging.end = { time: p.time, price: p.price };
  redrawDrawings();
});
window.addEventListener('mouseup', () => {
  if (!dragging) return;
  const { start, end, type } = dragging; dragging = null;
  const a = toXY(start), b = toXY(end);
  const moved = a.x != null && b.x != null && Math.hypot(b.x - a.x, b.y - a.y) > 6;
  if (type === 'hline' || moved) {
    const d = { type, points: [start, end], reveal: 0 };
    drawings.push(d); animateReveal(d);
  }
  finishDraw(); redrawDrawings();
});

function animateReveal(d) {
  const t0 = performance.now(), dur = 320;
  (function step(now) {
    const k = Math.min(1, (now - t0) / dur);
    d.reveal = 1 - Math.pow(1 - k, 3);
    redrawDrawings();
    if (k < 1) requestAnimationFrame(step);
  })(performance.now());
}
function finishDraw() {
  drawMode = null; drawCanvas.classList.remove('armed');
  document.querySelectorAll('.tool[data-draw]').forEach(b => b.classList.remove('active'));
}

/* ═══════════════════════════════════════════════════════════════════════════
   8. TOOLBAR + RANGE WIRING
   ═══════════════════════════════════════════════════════════════════════════ */
function wireToolbar() {
  const tb = document.getElementById('toolbar');
  tb.addEventListener('click', (e) => {
    const btn = e.target.closest('.tool'); if (!btn) return;

    if (btn.dataset.series) {
      tb.querySelectorAll('[data-series]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const candles = btn.dataset.series === 'candles';
      candleSeries.applyOptions({ visible: candles });
      lineSeries.applyOptions({ visible: !candles });
    }
    else if (btn.dataset.mode === 'zones') {
      const on = !btn.classList.contains('active');
      btn.classList.toggle('active', on);
      setZones(on);
    }
    else if (btn.dataset.mode === 'riskline') {
      const on = !btn.classList.contains('active');
      btn.classList.toggle('active', on);
      riskSeries.applyOptions({ visible: on });
    }
    else if (btn.dataset.draw) {
      const wasActive = btn.classList.contains('active');
      document.querySelectorAll('.tool[data-draw]').forEach(b => b.classList.remove('active'));
      if (wasActive) armDraw(null);
      else { btn.classList.add('active'); armDraw(btn.dataset.draw); }
    }
    else if (btn.dataset.action === 'clear') { drawings = []; dragging = null; redrawDrawings(); }
    else if (btn.dataset.action === 'fit') { applyRange(currentRange, true); }
  });
}

let currentRange = '1825';   // remembered so Reset View returns to the chosen window

// Smoothly animate the visible time range from wherever it is now to [from,to].
function animateRange(toFrom, toTo, animate = true) {
  const ts = chart.timeScale();
  const cur = ts.getVisibleRange();
  if (!animate || !cur) { ts.setVisibleRange({ from: toFrom, to: toTo }); return; }
  const f0 = cur.from, t0 = cur.to, t1 = performance.now(), dur = 420;
  (function step(now) {
    const k = Math.min(1, (now - t1) / dur);
    const e = 1 - Math.pow(1 - k, 3);   // ease-out cubic
    ts.setVisibleRange({ from: f0 + (toFrom - f0) * e, to: t0 + (toTo - t0) * e });
    if (k < 1) requestAnimationFrame(step);
  })(performance.now());
}

function applyRange(range, animate = true) {
  const firstT = RESULTS[0].t, lastT = RESULTS[RESULTS.length - 1].t;
  currentRange = range;
  document.querySelectorAll('.range-btn').forEach(x => x.classList.toggle('active', x.dataset.range === range));
  const from = range === 'all' ? firstT : Math.max(firstT, lastT - Number(range) * 86400);
  animateRange(from, lastT, animate);
}

function wireRanges() {
  document.getElementById('ranges').addEventListener('click', (e) => {
    const b = e.target.closest('.range-btn'); if (!b) return;
    applyRange(b.dataset.range, true);
  });
}

function wireStepper() {
  const input = document.getElementById('bt-amount');
  document.querySelectorAll('.num-stepper button').forEach(b => {
    b.addEventListener('click', () => {
      const step = Number(input.step) || 1, cur = Number(input.value) || 0;
      input.value = Math.max(Number(input.min) || 0, cur + (b.dataset.step === 'up' ? step : -step));
      input.dispatchEvent(new Event('input', { bubbles: true }));
    });
  });
}

/* ═══════════════════════════════════════════════════════════════════════════
   9. RENDER — stats, meter, histogram, table, backtest
   ═══════════════════════════════════════════════════════════════════════════ */
function renderStats() {
  const last = RESULTS[RESULTS.length - 1];
  const prev30 = RESULTS[RESULTS.length - 31] ?? RESULTS[0];
  const chg30 = ((last.c - prev30.c) / prev30.c) * 100;
  const ath = Math.max(...RESULTS.map(r => r.c));
  const fromAth = ((last.c - ath) / ath) * 100;
  const band = getBand(last.risk);
  const cards = [
    { k: 'BTC Price', v: fmtUSD(last.c) },
    { k: '30-Day Change', v: `${chg30 >= 0 ? '+' : ''}${chg30.toFixed(1)}%`, cls: chg30 >= 0 ? 'up' : 'down', d: 'vs 30 days ago' },
    { k: 'All-Time High', v: fmtUSD(ath), d: `${fromAth.toFixed(1)}% from ATH`, dcls: 'down' },
    { k: 'Fair Value', v: fmtUSD(last.trend), d: last.c < last.trend ? 'price below trend' : 'price above trend' },
    { k: 'Risk Score', v: last.risk.toFixed(3), vcolor: band.hex, d: band.label + ' Risk' },
  ];
  document.getElementById('stats-row').innerHTML = cards.map(c => `
    <div class="stat"><div class="k">${c.k}</div>
      <div class="v ${c.cls||''}" ${c.vcolor?`style="color:${c.vcolor}"`:''}>${c.v}</div>
      <div class="d ${c.dcls||''}">${c.d||''}</div></div>`).join('');
}

function renderMeter(risk) {
  const band = getBand(risk);
  document.getElementById('m-num').textContent = risk.toFixed(3);
  document.getElementById('m-num').style.color = band.hex;
  const lab = document.getElementById('m-lab');
  lab.textContent = band.label + ' Risk'; lab.style.color = band.hex;
  document.getElementById('m-action').textContent =
    band.mult > 0 ? `Buy ${band.mult}× your base amount` : band.mult === 0 ? 'Hold · no new buys' : 'Reduce / exit position';
  document.getElementById('m-needle').style.left = `${(risk * 100).toFixed(1)}%`;
}

function renderHistogram() {
  const counts = BANDS.map(() => 0);
  for (const r of RESULTS) counts[BANDS.indexOf(getBand(r.risk))]++;
  const pct = counts.map(c => c / RESULTS.length * 100);
  new Chart(document.getElementById('histChart'), {
    type: 'bar',
    data: { labels: BANDS.map(b => b.label), datasets: [{ data: pct, backgroundColor: BANDS.map(b => b.hex), borderRadius: 5 }] },
    options: {
      animation: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ` ${c.raw.toFixed(1)}% of days` } } },
      scales: {
        x: { ticks: { color: '#8a8a8d', font: { size: 10 } }, grid: { display: false } },
        y: { ticks: { color: '#525255', callback: v => v + '%' }, grid: { color: '#141a23' } },
      },
    },
  });
}

function renderBandTable(risk) {
  document.getElementById('band-body').innerHTML = BANDS.map(b => {
    const active = risk >= b.min && risk < b.max;
    const m = b.mult > 0 ? `${b.mult}×` : b.mult === 0 ? 'Hold' : 'Sell';
    return `<tr class="${active ? 'active' : ''}">
      <td><span class="dot" style="background:${b.hex}"></span>${b.label}${active ? ' · NOW' : ''}</td>
      <td>${b.min.toFixed(2)}–${b.max.toFixed(2)}</td><td>${b.action}</td><td>${m}</td></tr>`;
  }).join('');
}

function runBacktest() {
  const amount = Math.max(1, Number(document.getElementById('bt-amount').value) || 100);
  const freq = Number(document.getElementById('bt-freq').value);   // 0 = lump sum
  const sV = document.getElementById('bt-start').value, eV = document.getElementById('bt-end').value;
  const startSec = sV ? new Date(sV).getTime() / 1000 : RESULTS[0].t;
  const endSec = eV ? new Date(eV).getTime() / 1000 : RESULTS[RESULTS.length - 1].t;
  const data = RESULTS.filter(r => r.t >= startSec && r.t <= endSec);
  const res = document.getElementById('bt-results');
  if (data.length < 2) { res.innerHTML = '<p style="color:var(--text-dim)">Widen the date range.</p>'; return; }

  let flatSpent = 0, flatBtc = 0, dynSpent = 0, dynBtc = 0;

  if (freq === 0) {
    // lump sum: invest the full amount once at the start
    const r = data[0];
    flatSpent = amount; flatBtc = amount / r.c;
    const spend = amount * Math.max(0, getBand(r.risk).mult);   // dynamic scales the one-shot by risk
    dynSpent = spend; dynBtc = spend / r.c;
  } else {
    let lastBucket = -1;
    for (const r of data) {
      const bucket = Math.floor((r.t - data[0].t) / (freq * 86400));
      if (bucket === lastBucket) continue;
      lastBucket = bucket;
      flatSpent += amount; flatBtc += amount / r.c;
      const spend = amount * Math.max(0, getBand(r.risk).mult);
      dynSpent += spend; dynBtc += spend / r.c;
    }
  }

  const px = data[data.length - 1].c;
  const flatVal = flatBtc * px, dynVal = dynBtc * px;
  const flatRoi = flatSpent > 0 ? (flatVal - flatSpent) / flatSpent * 100 : 0;
  const dynRoi = dynSpent > 0 ? (dynVal - dynSpent) / dynSpent * 100 : 0;
  const dynWins = dynRoi >= flatRoi;
  const card = (title, roi, spent, val, btc, win) => `
    <div class="bt-card ${win ? 'winner' : ''}">
      <div class="t">${title}${win ? ' · WINNER' : ''}</div>
      <div class="big ${roi >= 0 ? 'up' : 'down'}">${roi >= 0 ? '+' : ''}${roi.toFixed(1)}%</div>
      <div class="row"><span>Invested</span><b>${fmtUSD(spent)}</b></div>
      <div class="row"><span>Value now</span><b>${fmtUSD(val)}</b></div>
      <div class="row"><span>BTC held</span><b>${btc.toFixed(4)}</b></div>
    </div>`;
  res.innerHTML =
    card('Dynamic DCA', dynRoi, dynSpent, dynVal, dynBtc, dynWins) +
    card('Flat DCA', flatRoi, flatSpent, flatVal, flatBtc, !dynWins);
}

/* ═══════════════════════════════════════════════════════════════════════════
   10. MAIN
   ═══════════════════════════════════════════════════════════════════════════ */
(async () => {
  const status = document.getElementById('status');
  try {
    status.textContent = 'Loading history…';
    const bars = await loadData();
    const { slope, intercept } = fitRegression(bars);
    SLOPE = slope; INTER = intercept;
    RESULTS = computeRisk(bars, slope, intercept);
    // capture dev bounds for the inverse (buy-zone) mapping
    const devs = RESULTS.map(x => Math.log(x.c / x.trend));
    DEV_LO = Math.min(...devs); DEV_HI = Math.max(...devs);
    RESULTS.forEach(r => byTime.set(r.t, r));
    const last = RESULTS[RESULTS.length - 1];

    buildChart();
    sizeDrawLayer();
    pushData();
    buildZones();
    wireToolbar();
    wireRanges();
    wireStepper();

    // default view: 5 years from today to today (no animation on first paint)
    const firstT = RESULTS[0].t, lastT = last.t;
    applyRange('1825', false);

    renderStats();
    renderMeter(last.risk);
    renderHistogram();
    renderBandTable(last.risk);

    // backtest defaults: start 3y ago, end today, can't go before first data
    const from3y = Math.max(firstT, lastT - 1095 * 86400);
    const bs = document.getElementById('bt-start'), be = document.getElementById('bt-end');
    bs.min = be.min = isoDay(firstT); bs.max = be.max = isoDay(lastT);
    bs.value = isoDay(from3y); be.value = isoDay(lastT);
    ['bt-amount', 'bt-freq', 'bt-start', 'bt-end'].forEach(id =>
      document.getElementById(id).addEventListener('input', runBacktest));
    runBacktest();

    status.textContent = `${RESULTS.length} days · ${isoDay(firstT)} → ${isoDay(lastT)} · slope ${slope.toFixed(2)}`;
  } catch (err) {
    status.textContent = 'Error: ' + err.message;
    console.error(err);
  }
})();
</script>
